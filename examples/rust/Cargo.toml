[package]
name = "my-space-music-catalogue"
version = "0.1.0"
edition = "2021"
description = "Type-safe mapping to the \"music_catalogue\" database"

# Generated from SQL queries using the pGenie (https://pgenie.io) code generator.
#
# The crate features:
#   - Ready-to-use statement definitions for all queries with associated parameter
#     and result types.
#   - Mappings for PostgreSQL enums and composite types.
#
# All statements are defined using the `tokio-postgres` library and implement the
# `Statement` trait, which provides a uniform `execute` interface.

[dependencies]
tokio-postgres = { version = "0.7", features = [
    "with-chrono-0_4",
    "with-uuid-1",
    "with-serde_json-1",
] }
postgres-types = { version = "0.2", features = [
    "derive",
    "with-chrono-0_4",
    "with-uuid-1",
] }
chrono = { version = "0.4", default-features = false, features = ["std"] }
uuid = { version = "1", features = ["v4"] }
bytes = "1"
deadpool-postgres = "0.14.1"

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
testcontainers = "0.23"
testcontainers-modules = { version = "0.11", features = ["postgres"] }
